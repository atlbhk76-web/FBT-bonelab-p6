name: Compile BONELAB Mod
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Download Ref References
      run: |
        Invoke-WebRequest -Uri "https://github.com" -OutFile "refs.zip"
      shell: powershell

    - name: Compile DLL
      run: |
        csc /target:library /out:StandaloneAIFBT.dll Mod.cs
      shell: cmd

